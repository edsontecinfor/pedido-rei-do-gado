<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Nota de Pedido - Rei do Gado</title>

<style>
:root {
  --bg:#f3f4f6;
  --card:#fff;
  --ink:#1f2937;
  --muted:#6b7280;
  --line:#e5e7eb;
}

body{
  margin:0;
  font-family:Arial;
  background:var(--bg);
  font-size:10px;
}

.page{
  max-width:560px;
  margin:auto;
}

.sheet{
  background:#fff;
  padding:8px;
  border-radius:8px;
}

/* HEADER AJUSTADO */
.header{
  display:grid;
  grid-template-columns:50px 1fr 80px;
  align-items:center;
  border-bottom:1px solid #ddd;
  padding-bottom:4px;
}

.brand img{
  width:42px;
}

.title-center{
  text-align:center;
}

.title-center h2{
  margin:0;
  font-size:14px;
}

.title-center p{
  margin:2px 0 0;
  font-size:9px;
  color:var(--muted);
}

.meta-row{
  font-size:8px;
}

/* CARDS */
.card{
  border:1px solid var(--line);
  margin-top:6px;
  padding:6px;
  border-radius:6px;
}

.row{
  display:grid;
  grid-template-columns:70px 1fr;
  font-size:9px;
  padding:2px 0;
}

/* FOOTER */
.footer{
  display:flex;
  justify-content:space-between;
  font-size:8px;
  margin-top:6px;
  border-top:1px solid #ddd;
  padding-top:4px;
}

.footer-extra{
  text-align:center;
  font-size:9px;
  margin-top:4px;
}

.footer-extra img{
  width:12px;
  vertical-align:middle;
}
</style>
</head>

<body>

<div class="page">
<div class="sheet">

<!-- HEADER -->
<div class="header">
  <div class="brand">
    <img src="https://cdn-icons-png.flaticon.com/512/616/616408.png">
  </div>

  <div class="title-center">
    <h2>REI DO GADO</h2>
    <p>Nota de pedido</p>
  </div>

  <div class="meta">
    <div class="meta-row"><strong>Pedido</strong> RG-0001</div>
    <div class="meta-row"><strong>Data</strong> 05/05/2026</div>
  </div>
</div>

<!-- CLIENTE -->
<div class="card">
<h3>Cliente</h3>
<div class="row"><div>Nome</div><div>-</div></div>
<div class="row"><div>Telefone</div><div>-</div></div>
</div>

<!-- PEDIDO -->
<div class="card">
<h3>Pedido</h3>
<div>-</div>
</div>

<!-- FOOTER -->
<div class="footer">
  <div>Uso interno</div>
  <div>Conferir entrega</div>
</div>

<div class="footer-extra">
produzido por <strong>clickitz.com.br</strong><br>
<img src="https://cdn-icons-png.flaticon.com/512/733/733585.png">
whatsapp: 9920180087
</div>

</div>
</div>

</body>
</html>
